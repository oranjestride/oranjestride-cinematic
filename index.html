<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OranjeStride — Stride into Decision Intelligence</title>
  <meta name="description" content="India's premier Generative AI & Data Science training consultancy. From data to decisions. From decisions to outcomes." />

  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="./img/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="./img/favicon-16.png" />
  <link rel="apple-touch-icon" href="./img/apple-touch-icon.png" />

  <!-- Open Graph / Twitter social share.
       NOTE: og:url and image URLs must be ABSOLUTE — update the domain below
       to your live site if it isn't https://oranjestride.com. -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="OranjeStride" />
  <meta property="og:title" content="OranjeStride — Stride into Decision Intelligence" />
  <meta property="og:description" content="India's premier Generative AI & Data Science training consultancy. From data to decisions. From decisions to outcomes." />
  <meta property="og:url" content="https://oranjestride.com/" />
  <meta property="og:image" content="https://oranjestride.com/img/og-cover.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="OranjeStride — Stride into Decision Intelligence" />
  <meta name="twitter:description" content="India's premier Generative AI & Data Science training consultancy." />
  <meta name="twitter:image" content="https://oranjestride.com/img/og-cover.jpg" />

  <!-- Start the hero mascot download at t=0 (high priority) so the sculpt is
       ready when the loader opens, instead of queuing behind the intro videos
       and popping in seconds later. -->
  <link rel="preload" href="./models/mascot.glb" as="fetch" crossorigin="anonymous" fetchpriority="high" />

  <!-- Analytics: Plausible — privacy-first, cookieless, GDPR-friendly.
       REQUIRES a Plausible account with this domain added to collect data.
       Change data-domain to your live domain, or swap this line for your
       preferred provider (GA4 / Umami / Fathom). Remove to disable. -->
  <script defer data-domain="oranjestride.com" src="https://plausible.io/js/script.js"></script>

  <!-- Fonts: Space Grotesk (display) + Inter (body), per §1 stack -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Everything is composed by src/main.js into #app -->
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
